# RBAC for Recovery Engine (Needs privileges to restart/scale pods)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: recovery-engine-sa
  namespace: kubepilot-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubepilot-recovery-role
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "delete"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets"]
  verbs: ["get", "list", "watch", "patch", "scale"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubepilot-recovery-binding
subjects:
- kind: ServiceAccount
  name: recovery-engine-sa
  namespace: kubepilot-system
roleRef:
  kind: ClusterRole
  name: kubepilot-recovery-role
  apiGroup: rbac.authorization.k8s.io
