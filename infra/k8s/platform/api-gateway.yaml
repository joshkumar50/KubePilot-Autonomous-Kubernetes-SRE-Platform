apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: kubepilot-system
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }
    http {
        upstream auth_service {
            server auth-service.kubepilot-apps.svc.cluster.local:8001;
        }
        upstream payment_service {
            server payment-service.kubepilot-apps.svc.cluster.local:8002;
        }
        server {
            listen 80;
            server_name _;

            location /auth/ {
                proxy_pass http://auth_service/;
                proxy_set_header Host $host;
            }
            location /payment/ {
                proxy_pass http://payment_service/;
                proxy_set_header Host $host;
            }
            location /health {
                return 200 '{"status":"ok", "service":"api-gateway"}';
                add_header Content-Type application/json;
            }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: kubepilot-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: nginx
        image: nginx:1.25-alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: config-volume
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: config-volume
        configMap:
          name: api-gateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: kubepilot-system
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
  selector:
    app: api-gateway
