apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: kubepilot-system
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-db
  namespace: kubepilot-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-db
  serviceName: postgres-db
  template:
    metadata:
      labels:
        app: postgres-db
    spec:
      containers:
      - env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              key: postgres_user
              name: kubepilot-secrets
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: postgres_password
              name: kubepilot-secrets
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              key: POSTGRES_DB
              name: kubepilot-global-config
        image: postgres:16-alpine
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - kubepilot
            - -d
            - kubepilot_db
          initialDelaySeconds: 15
          periodSeconds: 10
        name: postgres
        ports:
        - containerPort: 5432
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - kubepilot
            - -d
            - kubepilot_db
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: pgdata
      volumes:
      - name: pgdata
        persistentVolumeClaim:
          claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-db
  namespace: kubepilot-system
spec:
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: postgres-db
