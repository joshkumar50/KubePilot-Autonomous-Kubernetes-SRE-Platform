apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: dashboard-bff
  name: dashboard-bff
  namespace: kubepilot-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-bff
  template:
    metadata:
      labels:
        app: dashboard-bff
    spec:
      containers:
      - envFrom:
        - configMapRef:
            name: kubepilot-global-config
        - secretRef:
            name: kubepilot-secrets
        image: kubepilot/dashboard-bff:latest
        imagePullPolicy: Never
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        name: dashboard-bff
        ports:
        - containerPort: 8000
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-bff
  namespace: kubepilot-system
spec:
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: dashboard-bff
