apiVersion: v1
kind: ServiceAccount
metadata:
  name: recovery-engine-sa
  namespace: kubepilot-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: recovery-engine-role
rules:
- apiGroups:
  - apps
  - ''
  resources:
  - deployments
  - pods
  - replicasets
  - services
  - namespaces
  verbs:
  - get
  - list
  - watch
  - patch
  - update
  - restart
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: recovery-engine-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: recovery-engine-role
subjects:
- kind: ServiceAccount
  name: recovery-engine-sa
  namespace: kubepilot-system
