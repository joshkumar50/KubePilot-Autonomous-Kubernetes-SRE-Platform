apiVersion: v1
kind: ServiceAccount
metadata:
  name: fault-injection-sa
  namespace: kubepilot-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fault-injection-role
  namespace: kubepilot-apps
rules:
- apiGroups:
  - apps
  - ''
  resources:
  - deployments
  - pods
  - services
  - networkpolicies
  verbs:
  - get
  - list
  - watch
  - patch
  - update
  - delete
  - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fault-injection-binding
  namespace: kubepilot-apps
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: fault-injection-role
subjects:
- kind: ServiceAccount
  name: fault-injection-sa
  namespace: kubepilot-system
