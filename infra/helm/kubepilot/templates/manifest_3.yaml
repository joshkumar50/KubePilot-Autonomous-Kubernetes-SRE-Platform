apiVersion: v1
data:
  SERVICE_NAME: notification-service
kind: ConfigMap
metadata:
  name: notification-service-config
  namespace: kubepilot-apps
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: kubepilot-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - envFrom:
        - configMapRef:
            name: notification-service-config
        - configMapRef:
            name: kubepilot-global-config
        - secretRef:
            name: kubepilot-secrets
        image: kubepilot/notification-service:latest
        imagePullPolicy: Never
        livenessProbe:
          httpGet:
            path: /liveness
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        name: notification-service
        ports:
        - containerPort: 8000
        readinessProbe:
          httpGet:
            path: /readiness
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: kubepilot-apps
spec:
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: notification-service
