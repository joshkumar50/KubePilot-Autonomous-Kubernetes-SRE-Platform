apiVersion: v1
data:
  SERVICE_NAME: rollback-engine
kind: ConfigMap
metadata:
  name: rollback-engine-config
  namespace: kubepilot-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rollback-engine
  namespace: kubepilot-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rollback-engine
  template:
    metadata:
      labels:
        app: rollback-engine
    spec:
      containers:
      - envFrom:
        - configMapRef:
            name: rollback-engine-config
        - configMapRef:
            name: kubepilot-global-config
        - secretRef:
            name: kubepilot-secrets
        image: kubepilot/rollback-engine:latest
        imagePullPolicy: Never
        livenessProbe:
          httpGet:
            path: /liveness
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        name: rollback-engine
        ports:
        - containerPort: 8000
        readinessProbe:
          httpGet:
            path: /readiness
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
      serviceAccountName: recovery-engine-sa
---
apiVersion: v1
kind: Service
metadata:
  name: rollback-engine
  namespace: kubepilot-system
spec:
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: rollback-engine
