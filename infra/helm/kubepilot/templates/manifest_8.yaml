apiVersion: v1
data:
  SERVICE_NAME: ai-orchestrator
kind: ConfigMap
metadata:
  name: ai-orchestrator-config
  namespace: kubepilot-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-orchestrator
  namespace: kubepilot-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-orchestrator
  template:
    metadata:
      labels:
        app: ai-orchestrator
    spec:
      containers:
      - envFrom:
        - configMapRef:
            name: ai-orchestrator-config
        - configMapRef:
            name: kubepilot-global-config
        - secretRef:
            name: kubepilot-secrets
        image: kubepilot/ai-orchestrator:latest
        imagePullPolicy: Never
        livenessProbe:
          httpGet:
            path: /liveness
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        name: ai-orchestrator
        ports:
        - containerPort: 8000
        readinessProbe:
          httpGet:
            path: /readiness
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-orchestrator
  namespace: kubepilot-system
spec:
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: ai-orchestrator
