apiVersion: v1
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }
    http {
        upstream auth_service {
            server auth-service.kubepilot-apps.svc.cluster.local:80;
        }
        upstream payment_service {
            server payment-service.kubepilot-apps.svc.cluster.local:80;
        }
        upstream dashboard_bff {
            server dashboard-bff.kubepilot-system.svc.cluster.local:80;
        }
        server {
            listen 80;
            server_name _;
            location /auth/ {
                proxy_pass http://auth_service/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            }
            location /payment/ {
                proxy_pass http://payment_service/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            }
            location /api/ {
                proxy_pass http://dashboard_bff/api/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            }
            location /health {
                return 200 '{"status":"ok","service":"api-gateway"}';
                add_header Content-Type application/json;
            }
        }
    }
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: kubepilot-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: kubepilot-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - image: nginx:1.25-alpine
        imagePullPolicy: Never
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        name: nginx
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - mountPath: /etc/nginx/nginx.conf
          name: config-volume
          subPath: nginx.conf
      volumes:
      - configMap:
          name: api-gateway-config
        name: config-volume
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: kubepilot-system
spec:
  ports:
  - nodePort: 30080
    port: 80
    targetPort: 80
  selector:
    app: api-gateway
  type: NodePort
