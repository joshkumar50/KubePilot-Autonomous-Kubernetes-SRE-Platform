apiVersion: v1
kind: ConfigMap
metadata:
  name: inventory-service-config
  namespace: kubepilot-apps
data:
  SERVICE_NAME: "inventory-service"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: kubepilot-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
      - name: inventory-service
        image: kubepilot-inventory-service:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: inventory-service-config
        - configMapRef:
            name: kubepilot-global-config
        - secretRef:
            name: kubepilot-secrets
        livenessProbe:
          httpGet:
            path: /liveness
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readiness
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: kubepilot-apps
spec:
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: inventory-service
