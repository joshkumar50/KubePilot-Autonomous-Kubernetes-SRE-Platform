apiVersion: v1
kind: ConfigMap
metadata:
  name: traffic-generator-config
  namespace: kubepilot-apps
data:
  SERVICE_NAME: "traffic-generator"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-generator
  namespace: kubepilot-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traffic-generator
  template:
    metadata:
      labels:
        app: traffic-generator
    spec:
      containers:
      - name: traffic-generator
        image: kubepilot-traffic-generator:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: traffic-generator-config
        - configMapRef:
            name: kubepilot-global-config
        - secretRef:
            name: kubepilot-secrets
        livenessProbe:
          httpGet:
            path: /liveness
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readiness
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: traffic-generator
  namespace: kubepilot-apps
spec:
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: traffic-generator
