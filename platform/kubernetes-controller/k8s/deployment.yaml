apiVersion: v1
kind: ConfigMap
metadata:
  name: kubernetes-controller-config
  namespace: kubepilot-system
data:
  SERVICE_NAME: "kubernetes-controller"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-controller
  namespace: kubepilot-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubernetes-controller
  template:
    metadata:
      labels:
        app: kubernetes-controller
    spec:
      serviceAccountName: recovery-engine-sa  # Ensures they have K8s API rights if needed
      containers:
      - name: kubernetes-controller
        image: kubepilot-kubernetes-controller:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: kubernetes-controller-config
        - configMapRef:
            name: kubepilot-global-config
        - secretRef:
            name: kubepilot-secrets
        livenessProbe:
          httpGet:
            path: /liveness
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readiness
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: kubernetes-controller
  namespace: kubepilot-system
spec:
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: kubernetes-controller
