apiVersion: v1
kind: ServiceAccount
metadata:
  name: recovery-engine-sa
  namespace: kubepilot-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: recovery-engine-role
rules:
- apiGroups: ["apps", ""]
  resources: ["deployments", "pods", "replicasets", "services", "namespaces"]
  verbs: ["get", "list", "watch", "patch", "update", "restart"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: recovery-engine-binding
subjects:
- kind: ServiceAccount
  name: recovery-engine-sa
  namespace: kubepilot-system
roleRef:
  kind: ClusterRole
  name: recovery-engine-role
  apiGroup: rbac.authorization.k8s.io
