apiVersion: v1
kind: ConfigMap
metadata:
  name: telemetry-collector-config
  namespace: kubepilot-system
data:
  SERVICE_NAME: "telemetry-collector"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-collector
  namespace: kubepilot-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telemetry-collector
  template:
    metadata:
      labels:
        app: telemetry-collector
    spec:
      containers:
      - name: telemetry-collector
        image: kubepilot-telemetry-collector:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: telemetry-collector-config
        - configMapRef:
            name: kubepilot-global-config
        - secretRef:
            name: kubepilot-secrets
        livenessProbe:
          httpGet:
            path: /liveness
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readiness
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: telemetry-collector
  namespace: kubepilot-system
spec:
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: telemetry-collector
