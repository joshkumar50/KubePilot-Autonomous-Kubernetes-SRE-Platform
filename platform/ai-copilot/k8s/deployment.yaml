apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-copilot-config
  namespace: kubepilot-system
data:
  SERVICE_NAME: "ai-copilot"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-copilot
  namespace: kubepilot-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-copilot
  template:
    metadata:
      labels:
        app: ai-copilot
    spec:
      containers:
      - name: ai-copilot
        image: kubepilot-ai-copilot:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: ai-copilot-config
        - configMapRef:
            name: kubepilot-global-config
        - secretRef:
            name: kubepilot-secrets
        livenessProbe:
          httpGet:
            path: /liveness
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readiness
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-copilot
  namespace: kubepilot-system
spec:
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: ai-copilot
