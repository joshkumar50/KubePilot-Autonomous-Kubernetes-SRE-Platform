apiVersion: v1
kind: ConfigMap
metadata:
  name: rollback-engine-config
  namespace: kubepilot-system
data:
  SERVICE_NAME: "rollback-engine"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rollback-engine
  namespace: kubepilot-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rollback-engine
  template:
    metadata:
      labels:
        app: rollback-engine
    spec:
      serviceAccountName: recovery-engine-sa  # Ensures they have K8s API rights if needed
      containers:
      - name: rollback-engine
        image: kubepilot-rollback-engine:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: rollback-engine-config
        - configMapRef:
            name: kubepilot-global-config
        - secretRef:
            name: kubepilot-secrets
        livenessProbe:
          httpGet:
            path: /liveness
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readiness
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: rollback-engine
  namespace: kubepilot-system
spec:
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: rollback-engine
