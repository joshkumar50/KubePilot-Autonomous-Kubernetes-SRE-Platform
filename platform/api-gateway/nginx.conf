events {
    worker_connections 1024;
}

http {
    # Rate Limiting Zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Basic Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self';" always;
    server_tokens off;

    # Payload limits
    client_max_body_size 2M;

    upstream auth_service {
        server auth-service.kubepilot-apps.svc.cluster.local:8001;
    }
    upstream payment_service {
        server payment-service.kubepilot-apps.svc.cluster.local:8002;
    }
    upstream dashboard_bff {
        server dashboard-bff.kubepilot-system.svc.cluster.local:8000;
    }

    server {
        listen 80;
        server_name _;

        # Apply Rate Limiting
        limit_req zone=api_limit burst=10 nodelay;
        limit_conn conn_limit 10;

        location /auth/ {
            proxy_pass http://auth_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_addrs;
        }

        location /payment/ {
            proxy_pass http://payment_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_addrs;
        }

        location /api/ {
            # In a full deployment, auth_request /auth/validate could be used here
            # For Phase 9, BFF validates the JWT directly to manage RBAC.
            proxy_pass http://dashboard_bff/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_addrs;
        }

        location /health {
            return 200 '{"status":"ok", "service":"api-gateway"}';
            add_header Content-Type application/json;
        }
    }
}
