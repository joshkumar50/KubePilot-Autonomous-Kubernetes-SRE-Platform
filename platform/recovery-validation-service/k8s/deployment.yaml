apiVersion: apps/v1
kind: Deployment
metadata:
  name: recovery-validation-service
  namespace: kubepilot-system
  labels:
    app: recovery-validation-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recovery-validation-service
  template:
    metadata:
      labels:
        app: recovery-validation-service
    spec:
      containers:
      - name: recovery-validation-service
        image: kubepilot-recovery-validation-service:latest
        imagePullPolicy: Never
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true

        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: kubepilot-global-config
        - secretRef:
            name: kubepilot-secrets
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: recovery-validation-service
  namespace: kubepilot-system
spec:
  selector:
    app: recovery-validation-service
  ports:
  - port: 80
    targetPort: 8000
